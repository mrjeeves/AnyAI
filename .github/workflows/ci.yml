name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libasound2-dev
        # `cmake` is no longer in the dep list — whisper-rs was the only
        # consumer (it built whisper.cpp from source) and the new ASR
        # stack uses the `ort` crate with a dynamically-loaded
        # onnxruntime instead. The LunarG Vulkan SDK install steps
        # (Linux x86_64 + Windows) that used to live here are gone for
        # the same reason: only whisper-rs's Vulkan feature wanted them.

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy, rustfmt

      # macOS-14 ARM runners ship `/usr/local/bin/cargo` as a symlink to
      # `rustup-init` (the installer, not the rustup proxy), so plain
      # `cargo fmt` invokes the installer with `fmt` as an argument and
      # fails with `unexpected argument 'fmt' found`. Prepend the
      # rustup-installed cargo so the real binary wins on PATH.
      - name: Prefer rustup-installed cargo on macOS
        if: runner.os == 'macOS'
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # Belt-and-braces for macOS-14: `dtolnay/rust-toolchain`'s
      # `components:` install has been flaky on the ARM runner — three
      # consecutive runs of the fmt step have failed in <80s with no
      # real diff, while ubuntu-x86 / ubuntu-arm / windows pass. Force
      # rustfmt + clippy explicitly so a silent component miss can't
      # red the gate. Runs against the toolchain dtolnay picked up
      # (1.88.0) and is a no-op when the components are already there.
      - name: Ensure rustfmt + clippy on macOS
        if: runner.os == 'macOS'
        run: rustup component add rustfmt clippy --toolchain 1.88.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Frontend type-check
        run: pnpm check

      - name: Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust lint
        working-directory: src-tauri
        run: cargo clippy --all-targets

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --no-fail-fast
