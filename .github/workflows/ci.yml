name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libasound2-dev
        # `cmake` is no longer in the dep list — whisper-rs was the only
        # consumer (it built whisper.cpp from source) and the new ASR
        # stack uses the `ort` crate with a dynamically-loaded
        # onnxruntime instead. The LunarG Vulkan SDK install steps
        # (Linux x86_64 + Windows) that used to live here are gone for
        # the same reason: only whisper-rs's Vulkan feature wanted them.

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy, rustfmt

      # Belt-and-braces for macOS-14: `dtolnay/rust-toolchain`'s
      # `components:` install has been flaky on the ARM runner — past
      # runs of the fmt step failed in <80 s with no real diff, while
      # ubuntu-x86 / ubuntu-arm / windows passed. Force rustfmt + clippy
      # explicitly so a silent component miss can't red the gate. No-op
      # when the components are already there.
      - name: Ensure rustfmt + clippy on macOS
        if: runner.os == 'macOS'
        run: rustup component add rustfmt clippy --toolchain 1.88.0

      # Rust toolchain diagnostic on macOS. Past runs failed at `cargo
      # fmt --check` in <80 s with no diff — meaning either rustfmt
      # wasn't actually installed for the active toolchain, or `cargo`
      # was resolving to the `/usr/local/bin/cargo → rustup-init` symlink
      # which exits 1 on any subcommand. Printing what's there once,
      # before fmt runs, makes the next mystery failure debuggable.
      - name: Rust toolchain diagnostic (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "PATH=$PATH"
          which cargo || true
          which rustup || true
          rustup show
          rustup run 1.88.0 cargo --version
          rustup run 1.88.0 cargo fmt --version
          rustup run 1.88.0 cargo clippy --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Frontend type-check
        run: pnpm check

      # All three Rust steps go through `rustup run 1.88.0 cargo …`
      # rather than bare `cargo …`. On macOS-14 ARM, `/usr/local/bin/cargo`
      # is a symlink to `rustup-init` (the installer, not the rustup proxy);
      # plain `cargo fmt` invokes the installer with `fmt` as an argument
      # and exits 1 with no diff — exactly the failure mode we kept seeing.
      # Going through `rustup run` pins the toolchain explicitly and uses
      # the rustup proxy regardless of which `cargo` PATH resolves to, so
      # the gate behaves the same on every runner.
      - name: Rust formatting
        working-directory: src-tauri
        run: rustup run 1.88.0 cargo fmt --check

      - name: Rust lint
        working-directory: src-tauri
        run: rustup run 1.88.0 cargo clippy --all-targets

      - name: Rust tests
        working-directory: src-tauri
        run: rustup run 1.88.0 cargo test --no-fail-fast
