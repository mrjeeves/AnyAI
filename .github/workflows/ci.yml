name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libasound2-dev
        # `cmake` is no longer in the dep list — whisper-rs was the only
        # consumer (it built whisper.cpp from source) and the new ASR
        # stack uses the `ort` crate with a dynamically-loaded
        # onnxruntime instead. The LunarG Vulkan SDK install steps
        # (Linux x86_64 + Windows) that used to live here are gone for
        # the same reason: only whisper-rs's Vulkan feature wanted them.

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Frontend type-check
        run: pnpm check

      - name: Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust lint
        working-directory: src-tauri
        run: cargo clippy --all-targets

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --no-fail-fast
