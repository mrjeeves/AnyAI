name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libasound2-dev \
            cmake

      # Whisper Vulkan backend needs the LunarG SDK at build time:
      #   - Linux: apt's libvulkan-dev is missing glslc, which whisper.cpp's
      #     FindVulkan.cmake demands. Install the full SDK from LunarG's
      #     official apt repo on x86_64; arm64 stays CPU-only (Cargo.toml
      #     gates the feature off there).
      #   - Windows: whisper-rs-sys panics outright if VULKAN_SDK isn't
      #     set; use the humbletim action which exports it.
      #   - macOS: uses Metal, nothing to do here.
      - name: Install Vulkan SDK (Linux x86_64)
        if: runner.os == 'Linux' && runner.arch == 'X64'
        run: |
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/keyrings/lunarg-vulkan.asc > /dev/null
          UBU_CODENAME=$(. /etc/os-release && echo "$UBUNTU_CODENAME")
          echo "deb [signed-by=/etc/apt/keyrings/lunarg-vulkan.asc] https://packages.lunarg.com/vulkan ${UBU_CODENAME} main" \
            | sudo tee /etc/apt/sources.list.d/lunarg-vulkan.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.290.0
          cache: true

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Frontend type-check
        run: pnpm check

      - name: Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust lint
        working-directory: src-tauri
        run: cargo clippy --all-targets

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --no-fail-fast
