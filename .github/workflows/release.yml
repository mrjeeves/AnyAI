name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  bundles:
    name: Tauri bundles (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: linux-x86_64,  os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { name: macos-aarch64, os: macos-14,       target: aarch64-apple-darwin }
          - { name: macos-x86_64,  os: macos-14,       target: x86_64-apple-darwin }
          - { name: windows-x86_64, os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4

      # Guard against the "tag says v0.1.5, binary reports 0.1.2" trap.
      # The binary embeds CARGO_PKG_VERSION at compile time, so if the
      # manifests don't match the tag every install will misreport its
      # version and self-update will keep saying "update available."
      # src-tauri/Cargo.toml is the single source of truth; tauri.conf.json
      # has no version field (Tauri 2 falls back to Cargo.toml). package.json
      # is kept in sync by `just release` / scripts/bump-version.sh.
      - name: Verify tag matches manifest versions
        shell: bash
        run: |
          set -e
          TAG="${{ inputs.tag || github.ref_name }}"
          EXPECTED="${TAG#v}"
          fail() { echo "::error::$*"; exit 1; }
          got_cargo=$(awk -F\" '/^version = / {print $2; exit}' src-tauri/Cargo.toml)
          got_pkg=$(node -e "console.log(require('./package.json').version)")
          [[ "$got_cargo" == "$EXPECTED" ]] || fail "src-tauri/Cargo.toml version is $got_cargo, expected $EXPECTED (tag $TAG). Run 'just release $EXPECTED' to bump."
          [[ "$got_pkg"   == "$EXPECTED" ]] || fail "package.json version is $got_pkg, expected $EXPECTED (tag $TAG). Run 'just release $EXPECTED' to bump."
          echo "Manifest versions match tag $TAG ($EXPECTED)."

      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.platform.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build frontend (Vite)
        run: pnpm build

      - name: Verify frontend bundle
        shell: bash
        run: |
          set -e
          if [[ ! -f dist/index.html ]]; then
            echo "::error::dist/index.html missing — vite build failed silently"
            exit 1
          fi
          if grep -q '/src/main.ts' dist/index.html; then
            echo "::error::dist/index.html still references /src/main.ts — vite did not rewrite the entry"
            cat dist/index.html
            exit 1
          fi
          if [[ ! -d dist/assets ]] || [[ -z "$(ls -A dist/assets 2>/dev/null)" ]]; then
            echo "::error::dist/assets is empty — no compiled JS/CSS"
            ls -la dist/
            exit 1
          fi
          # Guard against the SSR-runtime regression: if Svelte's server build
          # leaks into the client bundle, `mount()` throws and the WebView is
          # blank. Detect by looking for the server-only error name.
          if grep -q 'lifecycle_function_unavailable' dist/assets/*.js; then
            echo "::error::dist bundle contains Svelte SSR runtime — mount() would throw in the browser. Check vite.config.ts resolve.conditions."
            exit 1
          fi
          echo "dist/ OK:"
          ls -la dist/ dist/assets/

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: ${{ inputs.tag || github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.platform.target }}

      - name: Package portable binary
        shell: bash
        run: |
          set -e
          BIN=src-tauri/target/${{ matrix.platform.target }}/release/anyai
          if [[ "${{ runner.os }}" == "Windows" ]]; then BIN="${BIN}.exe"; fi
          if [[ ! -f "$BIN" ]]; then
            echo "binary not found at $BIN"; exit 1
          fi
          mkdir -p dist-bin
          NAME="anyai-${{ matrix.platform.name }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "$BIN" "dist-bin/anyai.exe"
            (cd dist-bin && 7z a "${NAME}.zip" anyai.exe)
            sha256sum "dist-bin/${NAME}.zip" > "dist-bin/${NAME}.zip.sha256" 2>/dev/null \
              || shasum -a 256 "dist-bin/${NAME}.zip" > "dist-bin/${NAME}.zip.sha256"
          else
            cp "$BIN" "dist-bin/anyai"
            tar -czf "dist-bin/${NAME}.tar.gz" -C dist-bin anyai
            (cd dist-bin && (sha256sum "${NAME}.tar.gz" || shasum -a 256 "${NAME}.tar.gz") > "${NAME}.tar.gz.sha256")
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist-bin/anyai-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  installer-asset:
    name: Upload installers
    needs: bundles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            scripts/install.sh
            scripts/install.ps1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
