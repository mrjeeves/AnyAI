<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f0f" />
    <title>AnyAI · Remote</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #0f0f0f;
        color: #e8e8e8;
        overflow: hidden;
      }
      .app { display: flex; flex-direction: column; height: 100dvh; }
      header {
        flex-shrink: 0;
        display: flex; align-items: center; justify-content: space-between;
        gap: .75rem;
        padding: .65rem .9rem;
        border-bottom: 1px solid #1e1e1e;
        background: #0d0d0d;
      }
      .brand { font-weight: 600; font-size: .95rem; letter-spacing: .01em; }
      .brand small { color: #6e6ef7; font-weight: 500; margin-left: .35rem; }
      select.model {
        background: #131313;
        border: 1px solid #222;
        color: #ccc;
        font: inherit;
        font-size: .8rem;
        padding: .3rem .5rem;
        border-radius: 6px;
      }
      main {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 1rem .9rem 1.5rem;
        display: flex; flex-direction: column; gap: .65rem;
      }
      .msg {
        max-width: 86%;
        padding: .55rem .75rem;
        border-radius: 9px;
        font-size: .9rem;
        line-height: 1.45;
        white-space: pre-wrap;
        word-wrap: break-word;
      }
      .msg.user { align-self: flex-end; background: #1a1a2a; }
      .msg.assistant { align-self: flex-start; background: #161616; border: 1px solid #1e1e1e; }
      .msg.error { align-self: stretch; background: #2a1414; border: 1px solid #3a1d1d; color: #ffb4b4; font-size: .8rem; }
      .empty {
        margin: auto;
        text-align: center;
        color: #555;
        font-size: .85rem;
        padding: 2rem 1rem;
      }
      footer {
        flex-shrink: 0;
        border-top: 1px solid #1e1e1e;
        background: #0d0d0d;
        padding: .55rem .65rem calc(.55rem + env(safe-area-inset-bottom));
        display: flex; gap: .5rem; align-items: flex-end;
      }
      textarea {
        flex: 1;
        resize: none;
        background: #131313;
        border: 1px solid #222;
        color: #e8e8e8;
        font: inherit;
        font-size: .9rem;
        padding: .55rem .65rem;
        border-radius: 8px;
        max-height: 8rem;
        min-height: 2.4rem;
        line-height: 1.4;
      }
      textarea:focus { outline: none; border-color: #3a3a55; }
      button.send {
        background: #1a1a2a;
        border: 1px solid #2a2a3a;
        color: #e8e8e8;
        padding: .55rem .85rem;
        border-radius: 8px;
        font-size: .85rem;
        cursor: pointer;
        align-self: flex-end;
      }
      button.send:hover:not(:disabled) { background: #22223a; border-color: #3a3a55; }
      button.send:disabled { opacity: .4; cursor: default; }
      .status { font-size: .72rem; color: #666; }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="brand">AnyAI <small>remote</small></div>
        <select class="model" id="model"></select>
      </header>
      <main id="log">
        <div class="empty" id="empty">
          You're chatting with this AnyAI instance over the LAN.<br />
          Send a message to start.
        </div>
      </main>
      <footer>
        <textarea id="input" rows="1" placeholder="Message…" autofocus></textarea>
        <button class="send" id="send">Send</button>
      </footer>
    </div>
    <script>
      const SESSION_ID = (() => {
        const k = "anyai_remote_session";
        let v = sessionStorage.getItem(k);
        if (!v) {
          v = "remote-" + Math.random().toString(36).slice(2, 10) + "-" + Date.now().toString(36);
          sessionStorage.setItem(k, v);
        }
        return v;
      })();

      const log = document.getElementById("log");
      const empty = document.getElementById("empty");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const modelSel = document.getElementById("model");
      const messages = [];

      async function heartbeat() {
        try {
          await fetch("/api/heartbeat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ session_id: SESSION_ID }),
          });
        } catch {}
      }
      heartbeat();
      setInterval(heartbeat, 5000);

      async function loadModels() {
        try {
          const r = await fetch("/api/models");
          const j = await r.json();
          modelSel.innerHTML = "";
          for (const m of j.models) {
            const o = document.createElement("option");
            o.value = m.id;
            o.textContent = m.label;
            modelSel.appendChild(o);
          }
        } catch {
          const o = document.createElement("option");
          o.value = "anyai-text";
          o.textContent = "anyai · text";
          modelSel.appendChild(o);
        }
      }
      loadModels();

      function appendMsg(role, content) {
        if (empty.parentNode) empty.remove();
        const el = document.createElement("div");
        el.className = "msg " + role;
        el.textContent = content;
        log.appendChild(el);
        log.scrollTop = log.scrollHeight;
        return el;
      }

      input.addEventListener("input", () => {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 128) + "px";
      });
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });
      sendBtn.addEventListener("click", send);

      async function send() {
        const text = input.value.trim();
        if (!text || sendBtn.disabled) return;
        input.value = "";
        input.style.height = "auto";
        sendBtn.disabled = true;
        appendMsg("user", text);
        messages.push({ role: "user", content: text });
        const placeholder = appendMsg("assistant", "…");
        try {
          const r = await fetch("/api/chat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              model: modelSel.value || "anyai-text",
              messages,
              session_id: SESSION_ID,
            }),
          });
          const j = await r.json();
          if (j.error) throw new Error(j.error);
          placeholder.textContent = j.content || "";
          messages.push({ role: "assistant", content: j.content || "" });
        } catch (e) {
          placeholder.remove();
          appendMsg("error", "Error: " + (e && e.message ? e.message : String(e)));
          messages.pop();
        } finally {
          sendBtn.disabled = false;
          input.focus();
        }
      }
    </script>
  </body>
</html>
