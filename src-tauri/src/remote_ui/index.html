<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <title>AnyAI · Remote</title>
    <style>
      :root {
        --bg: #0f0f0f;
        --bg-elev: #131313;
        --bg-elev-2: #161616;
        --border: #1e1e1e;
        --border-strong: #2a2a3a;
        --text: #e8e8e8;
        --text-dim: #888;
        --text-faint: #555;
        --accent: #6e6ef7;
        --accent-soft: #1a1a2a;
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-top: env(safe-area-inset-top, 0px);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
      html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow: hidden;
        font-size: 16px;
        line-height: 1.5;
      }
      body { overscroll-behavior: none; }
      /* dvh keeps the layout aligned with the visible viewport when the
         mobile keyboard opens; falls back to vh on older browsers. */
      .app {
        display: flex; flex-direction: column;
        height: 100vh;
        height: 100dvh;
      }
      header {
        flex-shrink: 0;
        display: flex; align-items: center; justify-content: space-between;
        gap: .75rem;
        padding: calc(.65rem + var(--safe-top)) .9rem .65rem;
        border-bottom: 1px solid var(--border);
        background: #0d0d0d;
      }
      .brand { font-weight: 600; font-size: 1rem; letter-spacing: .01em; }
      .brand small { color: var(--accent); font-weight: 500; margin-left: .35rem; font-size: .82rem; }
      select.model {
        background: var(--bg-elev);
        border: 1px solid #222;
        color: #ccc;
        font: inherit;
        font-size: .85rem;
        padding: .4rem .6rem;
        border-radius: 7px;
        max-width: 50vw;
        min-height: 36px;
      }
      main {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        padding: 1rem .9rem 1.5rem;
        display: flex; flex-direction: column; gap: .65rem;
        scroll-padding-bottom: 4rem;
      }
      .msg {
        max-width: min(86%, 42rem);
        padding: .65rem .85rem;
        border-radius: 14px;
        font-size: 1rem;
        line-height: 1.5;
        white-space: pre-wrap;
        word-wrap: break-word;
        overflow-wrap: anywhere;
      }
      .msg.user {
        align-self: flex-end;
        background: var(--accent-soft);
        border-bottom-right-radius: 4px;
      }
      .msg.assistant {
        align-self: flex-start;
        background: var(--bg-elev-2);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }
      .msg.error {
        align-self: stretch;
        background: #2a1414;
        border: 1px solid #3a1d1d;
        color: #ffb4b4;
        font-size: .85rem;
        max-width: 100%;
      }
      .msg .body { display: block; }
      .msg .body.streaming::after {
        content: "▌";
        margin-left: 1px;
        color: var(--text-dim);
        animation: blink 1s steps(2, jump-none) infinite;
      }
      @keyframes blink { 50% { opacity: 0; } }
      .empty {
        margin: auto;
        text-align: center;
        color: var(--text-faint);
        font-size: .9rem;
        padding: 2rem 1rem;
      }

      /* Collapsible "Thoughts" panel — same shape as the desktop UI's
         <details>-based block. Open by default while streaming so the user
         sees the model thinking; the user can collapse afterwards. */
      details.thinking {
        margin-bottom: .35rem;
        background: #101218;
        border: 1px solid #1a1f2e;
        border-radius: 9px;
        font-size: .82rem;
      }
      details.thinking > summary {
        list-style: none;
        cursor: pointer;
        padding: .45rem .7rem;
        color: var(--text-dim);
        display: flex; align-items: center; gap: .4rem;
        user-select: none;
      }
      details.thinking > summary::-webkit-details-marker { display: none; }
      details.thinking > summary::before {
        content: "▸";
        color: var(--text-faint);
        font-size: .7rem;
        transition: transform .15s;
      }
      details.thinking[open] > summary::before { transform: rotate(90deg); }
      details.thinking .think-body {
        padding: 0 .7rem .55rem 1.4rem;
        color: #9aa;
        white-space: pre-wrap;
        word-wrap: break-word;
        overflow-wrap: anywhere;
        line-height: 1.55;
      }
      details.thinking[data-active="true"] > summary {
        color: var(--accent);
      }
      details.thinking[data-active="true"] > summary::after {
        content: "";
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--accent);
        margin-left: auto;
        animation: pulse-dot 1.4s ease-in-out infinite;
      }
      @keyframes pulse-dot { 50% { opacity: .4; } }

      footer {
        flex-shrink: 0;
        border-top: 1px solid var(--border);
        background: #0d0d0d;
        padding: .55rem .65rem calc(.55rem + var(--safe-bottom));
        display: flex; gap: .5rem; align-items: flex-end;
      }
      textarea {
        flex: 1;
        resize: none;
        background: var(--bg-elev);
        border: 1px solid #222;
        color: var(--text);
        font: inherit;
        font-size: 1rem;
        padding: .65rem .8rem;
        border-radius: 12px;
        max-height: 9rem;
        min-height: 44px;
        line-height: 1.45;
      }
      textarea:focus { outline: none; border-color: var(--border-strong); }
      button.send, button.stop {
        background: var(--accent-soft);
        border: 1px solid var(--border-strong);
        color: var(--text);
        padding: 0 1.05rem;
        border-radius: 12px;
        font: inherit;
        font-size: .9rem;
        cursor: pointer;
        align-self: flex-end;
        height: 44px;
        min-width: 64px;
        flex-shrink: 0;
      }
      button.send:hover:not(:disabled),
      button.stop:hover:not(:disabled) {
        background: #22223a;
        border-color: #3a3a55;
      }
      button.send:disabled { opacity: .4; cursor: default; }
      button.stop {
        background: #2a1818;
        border-color: #4a2222;
        color: #ffb4b4;
      }

      /* Phone tweaks: tighten paddings on narrow screens but keep the
         touch targets large enough to hit comfortably (44px min). */
      @media (max-width: 480px) {
        header { padding: calc(.55rem + var(--safe-top)) .65rem .55rem; }
        main { padding: .85rem .65rem 1.25rem; gap: .55rem; }
        .msg { max-width: 92%; padding: .6rem .75rem; }
        select.model { font-size: .78rem; padding: .3rem .45rem; }
      }
      @media (prefers-reduced-motion: reduce) {
        .msg .body.streaming::after,
        details.thinking[data-active="true"] > summary::after { animation: none; }
      }

      /* ----- Sidebar (conversations) ----- */
      .layout {
        position: relative;
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      .sidebar {
        position: absolute;
        inset: 0 auto 0 0;
        width: min(82vw, 280px);
        background: #0b0b0b;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        z-index: 30;
        transform: translateX(-100%);
        transition: transform .18s ease;
        padding-top: var(--safe-top);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-head {
        display: flex; align-items: center; gap: .35rem;
        padding: .5rem .55rem;
        border-bottom: 1px solid #161616;
      }
      .sidebar-head .new {
        flex: 1;
        display: flex; align-items: center; gap: .45rem;
        background: none;
        border: 1px solid #2a2a2a;
        color: #ccc;
        padding: .45rem .6rem;
        border-radius: 8px;
        font: inherit;
        font-size: .85rem;
        cursor: pointer;
        min-height: 38px;
      }
      .sidebar-head .new:hover { border-color: #3a3a55; color: #fff; background: #131320; }
      .sidebar-head .close {
        background: none; border: none;
        color: #777; cursor: pointer;
        padding: .35rem .45rem;
        border-radius: 6px;
        font-size: 1.05rem;
        line-height: 1;
      }
      .sidebar-head .close:hover { background: #1a1a1a; color: #ccc; }
      .sidebar-list {
        flex: 1;
        overflow-y: auto;
        padding: .35rem .25rem .75rem;
        -webkit-overflow-scrolling: touch;
      }
      .sidebar-list .group {
        font-size: .68rem;
        text-transform: uppercase;
        letter-spacing: .04em;
        color: #555;
        padding: .55rem .65rem .25rem;
      }
      .sidebar-list .row {
        display: flex; align-items: center; gap: .35rem;
        padding: .45rem .5rem;
        margin: 1px 0;
        border-radius: 7px;
        color: #bbb;
        font-size: .87rem;
        cursor: pointer;
        position: relative;
      }
      .sidebar-list .row:hover { background: #161616; color: #e8e8e8; }
      .sidebar-list .row.active { background: #1c1c2e; color: #fff; }
      .sidebar-list .row .title {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .sidebar-list .row .kebab {
        background: none; border: none;
        color: #555;
        cursor: pointer;
        padding: .25rem .35rem;
        border-radius: 5px;
        font-size: 1rem;
        line-height: 1;
        opacity: 0;
        transition: opacity .12s;
      }
      .sidebar-list .row:hover .kebab,
      .sidebar-list .row.active .kebab { opacity: 1; }
      /* On touch devices the kebab is the only way to reach Rename / Delete
         (no hover state), so always show it. */
      @media (pointer: coarse) {
        .sidebar-list .row .kebab { opacity: 1; }
      }
      .sidebar-list .rename {
        flex: 1;
        background: #1a1a1a;
        border: 1px solid #3a3a55;
        color: #fff;
        padding: .25rem .4rem;
        border-radius: 5px;
        font: inherit;
        font-size: .85rem;
        min-width: 0;
      }
      .sidebar-list .rename:focus { outline: none; border-color: var(--accent); }
      .sidebar-list .empty-row {
        color: #555; font-size: .8rem;
        text-align: center; padding: 1rem;
      }
      .sidebar-scrim {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, .35);
        z-index: 25;
      }
      .menu {
        position: fixed;
        z-index: 60;
        background: #131320;
        border: 1px solid #2a2a3a;
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, .5);
        padding: .25rem;
        display: flex; flex-direction: column;
        min-width: 140px;
      }
      .menu button {
        text-align: left;
        background: none; border: none;
        color: #e8e8e8;
        font: inherit;
        font-size: .85rem;
        padding: .5rem .65rem;
        border-radius: 5px;
        cursor: pointer;
      }
      .menu button:hover { background: #1f1f33; }
      .menu button.danger { color: #ff8b8b; }
      .menu button.danger:hover { background: #2a1818; }
      .menu-scrim {
        position: fixed; inset: 0;
        z-index: 55;
        background: transparent;
      }

      .hamburger {
        background: none;
        border: none;
        color: #888;
        cursor: pointer;
        padding: .35rem .45rem;
        border-radius: 6px;
        line-height: 1;
        font-size: 1.1rem;
      }
      .hamburger:hover { background: #1a1a1a; color: #ccc; }

      .kicked-overlay {
        position: fixed; inset: 0;
        background: rgba(7, 7, 12, .92);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        padding: 1rem;
      }
      .kicked-card {
        max-width: 22rem;
        background: #1a1313;
        border: 1px solid #4a2222;
        border-radius: 12px;
        padding: 1.1rem 1.25rem;
        text-align: center;
      }
      .kicked-title {
        font-size: 1rem;
        font-weight: 600;
        color: #ffb4b4;
        margin-bottom: .35rem;
      }
      .kicked-sub {
        font-size: .85rem;
        color: #c9a;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <button class="hamburger" id="hamburger" aria-label="Show conversations" title="Conversations">☰</button>
        <div class="brand">AnyAI <small>remote</small></div>
        <select class="model" id="model"></select>
      </header>
      <div class="layout">
        <aside class="sidebar" id="sidebar" aria-hidden="true">
          <div class="sidebar-head">
            <button class="new" id="newChatBtn">+ New chat</button>
            <button class="close" id="closeSidebar" aria-label="Hide conversations">×</button>
          </div>
          <div class="sidebar-list" id="sidebarList"></div>
        </aside>
        <div class="sidebar-scrim" id="sidebarScrim" hidden></div>
        <main id="log">
          <div class="empty" id="empty">
            You're chatting with this AnyAI instance over the LAN.<br />
            Send a message to start.
          </div>
        </main>
        <footer>
          <textarea id="input" rows="1" placeholder="Message…"></textarea>
          <button class="send" id="send">Send</button>
        </footer>
      </div>
    </div>
    <script>
      const SESSION_ID = (() => {
        const k = "anyai_remote_session";
        let v = sessionStorage.getItem(k);
        if (!v) {
          v = "remote-" + Math.random().toString(36).slice(2, 10) + "-" + Date.now().toString(36);
          sessionStorage.setItem(k, v);
        }
        return v;
      })();

      const log = document.getElementById("log");
      const empty = document.getElementById("empty");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const modelSel = document.getElementById("model");
      const hamburger = document.getElementById("hamburger");
      const sidebar = document.getElementById("sidebar");
      const sidebarScrim = document.getElementById("sidebarScrim");
      const closeSidebar = document.getElementById("closeSidebar");
      const sidebarList = document.getElementById("sidebarList");
      const newChatBtn = document.getElementById("newChatBtn");
      const messages = [];
      let inflight = null;

      // Conversation state. activeId mirrors the backend pointer; conv is the
      // full record (including any thinking blocks loaded from disk). Both go
      // null while the user is on a fresh "New chat" surface.
      let activeId = null;
      let conv = null;
      let conversations = [];

      let heartbeatTimer = null;
      let kicked = false;
      let initialActiveLoaded = false;

      async function heartbeat() {
        try {
          const r = await fetch("/api/heartbeat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ session_id: SESSION_ID }),
          });
          if (r.status === 403) {
            // Host pressed "Kick" / "Kick & Hide" — stop reconnecting and
            // show the disconnect overlay until the user closes the tab.
            handleKicked();
            return;
          }
          // First successful heartbeat: load whatever conversation the
          // local desktop had open so the phone lands on the same
          // transcript instead of an empty chat.
          if (!initialActiveLoaded) {
            initialActiveLoaded = true;
            loadActiveFromServer();
            loadConversations();
          }
        } catch {}
      }
      heartbeat();
      heartbeatTimer = setInterval(heartbeat, 5000);

      function handleKicked() {
        if (kicked) return;
        kicked = true;
        if (heartbeatTimer) clearInterval(heartbeatTimer);
        if (inflight) inflight.abort();
        const overlay = document.createElement("div");
        overlay.className = "kicked-overlay";
        overlay.innerHTML =
          '<div class="kicked-card">' +
          '<div class="kicked-title">Disconnected</div>' +
          '<div class="kicked-sub">The host kicked this device. Close this tab to release the connection.</div>' +
          "</div>";
        document.body.appendChild(overlay);
        sendBtn.disabled = true;
        input.disabled = true;
      }

      async function loadModels() {
        try {
          const r = await fetch("/api/models");
          const j = await r.json();
          modelSel.innerHTML = "";
          for (const m of j.models) {
            const o = document.createElement("option");
            o.value = m.id;
            o.textContent = m.label;
            modelSel.appendChild(o);
          }
        } catch {
          const o = document.createElement("option");
          o.value = "anyai-text";
          o.textContent = "anyai · text";
          modelSel.appendChild(o);
        }
      }
      loadModels();

      // -------------------------------------------------------------------
      // Rendering helpers
      // -------------------------------------------------------------------

      function nearBottom() {
        const slack = 80;
        return log.scrollTop + log.clientHeight + slack >= log.scrollHeight;
      }
      function scrollToBottom(force) {
        if (force || nearBottom()) {
          log.scrollTop = log.scrollHeight;
        }
      }

      function appendUserMsg(text) {
        if (empty.parentNode) empty.remove();
        const el = document.createElement("div");
        el.className = "msg user";
        el.textContent = text;
        log.appendChild(el);
        scrollToBottom(true);
      }

      function appendAssistantBubble() {
        if (empty.parentNode) empty.remove();
        const wrap = document.createElement("div");
        wrap.className = "msg assistant";

        const thinkDetails = document.createElement("details");
        thinkDetails.className = "thinking";
        thinkDetails.open = true;
        thinkDetails.dataset.active = "true";
        thinkDetails.style.display = "none"; // shown lazily on first thinking token

        const thinkSummary = document.createElement("summary");
        thinkSummary.textContent = "Thinking…";
        const thinkBody = document.createElement("div");
        thinkBody.className = "think-body";

        thinkDetails.appendChild(thinkSummary);
        thinkDetails.appendChild(thinkBody);

        const body = document.createElement("span");
        body.className = "body streaming";

        wrap.appendChild(thinkDetails);
        wrap.appendChild(body);
        log.appendChild(wrap);
        scrollToBottom(true);
        return { wrap, thinkDetails, thinkSummary, thinkBody, body };
      }

      function appendErrorMsg(text) {
        if (empty.parentNode) empty.remove();
        const el = document.createElement("div");
        el.className = "msg error";
        el.textContent = "Error: " + text;
        log.appendChild(el);
        scrollToBottom(true);
      }

      // -------------------------------------------------------------------
      // Streaming via SSE-over-fetch. We can't use EventSource because it
      // only supports GET; the chat payload needs POST. A fetch-stream
      // reader + tiny SSE parser is plenty for our framing.
      // -------------------------------------------------------------------

      async function streamChat(payload, handlers) {
        const ctrl = new AbortController();
        inflight = ctrl;
        let r;
        try {
          r = await fetch("/api/chat/stream", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload),
            signal: ctrl.signal,
          });
        } catch (e) {
          if (e.name !== "AbortError") handlers.onError(String(e));
          handlers.onDone();
          return;
        }
        if (r.status === 403) {
          handleKicked();
          handlers.onDone();
          return;
        }
        if (!r.ok) {
          handlers.onError("HTTP " + r.status);
          handlers.onDone();
          return;
        }

        const reader = r.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buf = "";
        try {
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            // SSE frames are separated by a blank line. Split on \n\n /
            // \r\n\r\n to be tolerant of either line ending.
            let idx;
            while ((idx = buf.search(/\r?\n\r?\n/)) !== -1) {
              const raw = buf.slice(0, idx);
              const sep = buf.slice(idx).match(/^\r?\n\r?\n/)[0];
              buf = buf.slice(idx + sep.length);
              processFrame(raw);
            }
          }
        } catch (e) {
          if (e.name !== "AbortError") handlers.onError(String(e));
        } finally {
          inflight = null;
        }

        function processFrame(raw) {
          let event = "message";
          let data = "";
          for (const line of raw.split(/\r?\n/)) {
            if (!line) continue;
            if (line.startsWith(":")) continue; // SSE comment / keep-alive
            if (line.startsWith("event:")) {
              event = line.slice(6).trim();
            } else if (line.startsWith("data:")) {
              data += (data ? "\n" : "") + line.slice(5).trim();
            }
          }
          if (!data) return;
          let payload;
          try { payload = JSON.parse(data); } catch { return; }
          if (event === "error" || payload.error) {
            handlers.onError(payload.message || payload.error || "stream error");
            return;
          }
          if (typeof payload.thinking === "string") handlers.onThinking(payload.thinking);
          if (typeof payload.delta === "string") handlers.onDelta(payload.delta);
          if (payload.done) handlers.onDone();
        }
      }

      // -------------------------------------------------------------------
      // Send loop
      // -------------------------------------------------------------------

      function setSending(sending) {
        if (sending) {
          sendBtn.textContent = "Stop";
          sendBtn.classList.remove("send");
          sendBtn.classList.add("stop");
        } else {
          sendBtn.textContent = "Send";
          sendBtn.classList.remove("stop");
          sendBtn.classList.add("send");
        }
      }

      input.addEventListener("input", () => {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 144) + "px";
      });
      input.addEventListener("keydown", (e) => {
        // On phones the Enter key inserts a newline (more like a real
        // messenger); on desktops Enter sends, Shift+Enter newlines.
        const isCoarse = matchMedia("(pointer: coarse)").matches;
        if (e.key === "Enter" && !e.shiftKey && !isCoarse) {
          e.preventDefault();
          send();
        }
      });
      sendBtn.addEventListener("click", () => {
        if (inflight) {
          inflight.abort();
        } else {
          send();
        }
      });

      async function send() {
        const text = input.value.trim();
        if (!text || inflight) return;
        input.value = "";
        input.style.height = "auto";
        const wasFreshChat = messages.length === 0;
        appendUserMsg(text);
        messages.push({ role: "user", content: text });
        const slot = appendAssistantBubble();
        let assistantContent = "";
        let assistantThinking = "";
        const modelAtSend = modelSel.value || "anyai-text";
        setSending(true);
        await streamChat(
          {
            model: modelAtSend,
            // The Ollama API rejects unknown fields like `thinking`, so strip
            // to `{role, content}` before sending the history upstream.
            messages: messages.map((m) => ({ role: m.role, content: m.content })),
            session_id: SESSION_ID,
          },
          {
            onThinking(delta) {
              assistantThinking += delta;
              slot.thinkDetails.style.display = "";
              slot.thinkSummary.textContent = assistantContent ? "Thoughts" : "Thinking…";
              slot.thinkBody.textContent = assistantThinking;
              scrollToBottom();
            },
            onDelta(delta) {
              assistantContent += delta;
              slot.body.textContent = assistantContent;
              if (assistantThinking) {
                // First content token means the model is past thinking —
                // collapse the panel and stop the pulsing dot.
                slot.thinkDetails.dataset.active = "false";
                slot.thinkDetails.open = false;
                slot.thinkSummary.textContent = "Thoughts";
              }
              scrollToBottom();
            },
            onError(msg) {
              slot.wrap.remove();
              appendErrorMsg(msg);
              messages.pop();
            },
            async onDone() {
              slot.body.classList.remove("streaming");
              slot.thinkDetails.dataset.active = "false";
              if (assistantContent) {
                const stored = { role: "assistant", content: assistantContent };
                if (assistantThinking) stored.thinking = assistantThinking;
                messages.push(stored);
              } else if (slot.wrap.parentNode) {
                // Empty assistant bubble (e.g. user aborted before any token)
                slot.wrap.remove();
                messages.pop();
              }
              setSending(false);
              input.focus();
              // Persist the conversation. On the very first turn create a
              // fresh record (id, timestamps, model snapshot); on later
              // turns just refresh `messages` + `updated_at`.
              try {
                await persistConversation(modelAtSend);
              } catch (e) {
                console.warn("persist failed", e);
              }
              // Auto-title runs out-of-band so it can't block the input
              // from coming back. Only fires on the first turn of a new
              // chat where the title is still the placeholder.
              if (wasFreshChat && conv && (conv.title === "New chat" || !conv.title)) {
                generateTitleAsync(modelAtSend, text);
              }
            },
          },
        );
      }

      // -------------------------------------------------------------------
      // Conversation persistence (calls the LAN HTTP endpoints; the local
      // desktop UI talks to the same files via Tauri commands).
      // -------------------------------------------------------------------

      function newConvId() {
        return Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
      }

      async function api(path, opts) {
        const r = await fetch(path, opts);
        if (r.status === 403) {
          handleKicked();
          throw new Error("kicked");
        }
        if (!r.ok) throw new Error("HTTP " + r.status);
        if (r.status === 204) return null;
        const ct = r.headers.get("content-type") || "";
        return ct.includes("json") ? r.json() : r.text();
      }

      async function persistConversation(modelTag) {
        const now = new Date().toISOString();
        if (!conv) {
          conv = {
            id: newConvId(),
            title: "New chat",
            mode: "text",
            model: modelTag,
            family: "",
            created_at: now,
            updated_at: now,
            messages: [],
          };
          activeId = conv.id;
        } else {
          conv.model = modelTag;
        }
        conv.messages = messages.map((m) => {
          const out = { role: m.role, content: m.content };
          if (m.thinking) out.thinking = m.thinking;
          return out;
        });
        conv.updated_at = now;
        await api(`/api/conversations/${conv.id}`, {
          method: "PUT",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(conv),
        });
        await setActiveServer(conv.id);
        await loadConversations();
      }

      function cleanTitle(raw) {
        if (!raw) return "";
        let t = String(raw).replace(/<think>[\s\S]*?<\/think>/gi, "").trim();
        t = t.replace(/^title\s*[:\-]\s*/i, "").trim();
        t = t.replace(/^["'`]+|["'`]+$/g, "").trim();
        t = t.split(/\r?\n/, 1)[0].trim();
        if (t.length > 60) t = t.slice(0, 60).trimEnd() + "…";
        return t;
      }
      function fallbackTitle(seed) {
        const flat = String(seed).replace(/\s+/g, " ").trim();
        return flat.length > 48 ? flat.slice(0, 48).trimEnd() + "…" : flat || "New chat";
      }

      async function generateTitleAsync(model, seed) {
        const trimmed = String(seed || "").trim().slice(0, 240);
        if (!trimmed || !conv) return;
        const targetId = conv.id;
        let title;
        try {
          const j = await api("/api/chat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              model,
              session_id: SESSION_ID,
              messages: [
                {
                  role: "user",
                  content:
                    "Write a 3-5 word title for a chat that opens with the message below. " +
                    "Reply with ONLY the title — no quotes, no punctuation, no preamble.\n\n" +
                    trimmed,
                },
              ],
              options: { num_predict: 16, temperature: 0.3 },
            }),
          });
          title = cleanTitle(j && j.content) || fallbackTitle(trimmed);
        } catch {
          title = fallbackTitle(trimmed);
        }
        // The user may have renamed it via the kebab menu while we waited;
        // only overwrite if the title is still the placeholder.
        if (!conv || conv.id !== targetId) return;
        if (conv.title && conv.title !== "New chat") return;
        conv.title = title;
        conv.updated_at = new Date().toISOString();
        try {
          await api(`/api/conversations/${conv.id}`, {
            method: "PUT",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(conv),
          });
          await loadConversations();
        } catch {}
      }

      async function setActiveServer(id) {
        try {
          await api("/api/active-conversation", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ id: id || null }),
          });
        } catch {}
      }

      async function loadActiveFromServer() {
        try {
          const j = await api("/api/active-conversation");
          if (j && j.id) await switchToConversation(j.id);
        } catch {}
      }

      async function loadConversations() {
        try {
          const j = await api("/api/conversations");
          conversations = (j && j.items) || [];
          renderSidebar();
        } catch {}
      }

      // -------------------------------------------------------------------
      // Switching / clearing / rendering
      // -------------------------------------------------------------------

      function clearChatSurface() {
        // Tear down every message bubble; the .empty placeholder is
        // re-created lazily by appendUserMsg / appendAssistantBubble.
        log.innerHTML = "";
        log.appendChild(empty);
        messages.length = 0;
      }

      function renderHistoricalMessage(m) {
        if (m.role === "user") {
          appendUserMsg(m.content);
          return;
        }
        if (empty.parentNode) empty.remove();
        const wrap = document.createElement("div");
        wrap.className = "msg assistant";
        if (m.thinking) {
          const det = document.createElement("details");
          det.className = "thinking";
          const sum = document.createElement("summary");
          sum.textContent = "Thoughts";
          const body = document.createElement("div");
          body.className = "think-body";
          body.textContent = m.thinking;
          det.appendChild(sum);
          det.appendChild(body);
          wrap.appendChild(det);
        }
        const body = document.createElement("span");
        body.className = "body";
        body.textContent = m.content;
        wrap.appendChild(body);
        log.appendChild(wrap);
        scrollToBottom(true);
      }

      async function switchToConversation(id) {
        if (!id) {
          conv = null;
          activeId = null;
          clearChatSurface();
          renderSidebar();
          return;
        }
        try {
          const c = await api(`/api/conversations/${id}`);
          conv = c;
          activeId = c.id;
          clearChatSurface();
          for (const m of c.messages || []) {
            messages.push({ role: m.role, content: m.content, thinking: m.thinking });
            renderHistoricalMessage(m);
          }
          renderSidebar();
        } catch {
          // Fall back to a clean slate if the file vanished mid-switch.
          conv = null;
          activeId = null;
          clearChatSurface();
          renderSidebar();
        }
      }

      // -------------------------------------------------------------------
      // Sidebar UI
      // -------------------------------------------------------------------

      function setSidebarOpen(open) {
        sidebar.classList.toggle("open", open);
        sidebar.setAttribute("aria-hidden", String(!open));
        sidebarScrim.hidden = !open;
      }

      hamburger.addEventListener("click", () => setSidebarOpen(true));
      closeSidebar.addEventListener("click", () => setSidebarOpen(false));
      sidebarScrim.addEventListener("click", () => setSidebarOpen(false));

      newChatBtn.addEventListener("click", async () => {
        setSidebarOpen(false);
        conv = null;
        activeId = null;
        clearChatSurface();
        renderSidebar();
        await setActiveServer(null);
      });

      function groupConversations(list) {
        const now = Date.now();
        const day = 86400000;
        const buckets = [
          { label: "Today", rows: [] },
          { label: "Yesterday", rows: [] },
          { label: "Previous 7 days", rows: [] },
          { label: "Older", rows: [] },
        ];
        for (const c of list) {
          const t = c.updated_at ? Date.parse(c.updated_at) : 0;
          const age = now - t;
          if (age < day) buckets[0].rows.push(c);
          else if (age < 2 * day) buckets[1].rows.push(c);
          else if (age < 7 * day) buckets[2].rows.push(c);
          else buckets[3].rows.push(c);
        }
        return buckets.filter((b) => b.rows.length > 0);
      }

      function renderSidebar() {
        sidebarList.innerHTML = "";
        if (!conversations || conversations.length === 0) {
          const e = document.createElement("div");
          e.className = "empty-row";
          e.textContent = "No conversations yet.";
          sidebarList.appendChild(e);
          return;
        }
        for (const g of groupConversations(conversations)) {
          const lab = document.createElement("div");
          lab.className = "group";
          lab.textContent = g.label;
          sidebarList.appendChild(lab);
          for (const c of g.rows) sidebarList.appendChild(renderRow(c));
        }
      }

      function renderRow(c) {
        const row = document.createElement("div");
        row.className = "row" + (c.id === activeId ? " active" : "");
        row.dataset.id = c.id;

        const title = document.createElement("span");
        title.className = "title";
        title.textContent = c.title || "Untitled";
        row.appendChild(title);

        const kebab = document.createElement("button");
        kebab.className = "kebab";
        kebab.textContent = "⋯";
        kebab.setAttribute("aria-label", "More actions");
        kebab.addEventListener("click", (e) => {
          e.stopPropagation();
          const r = kebab.getBoundingClientRect();
          openMenu(r.left, r.bottom + 4, c.id);
        });
        row.appendChild(kebab);

        row.addEventListener("click", async () => {
          setSidebarOpen(false);
          await switchToConversation(c.id);
          await setActiveServer(c.id);
        });
        row.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          openMenu(e.clientX, e.clientY, c.id);
        });
        return row;
      }

      // -------------------------------------------------------------------
      // Kebab / context menu (Rename, Delete)
      // -------------------------------------------------------------------

      let menuEl = null;
      let menuScrimEl = null;
      function openMenu(x, y, id) {
        closeMenu();
        menuScrimEl = document.createElement("div");
        menuScrimEl.className = "menu-scrim";
        menuScrimEl.addEventListener("click", closeMenu);
        menuScrimEl.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          closeMenu();
        });
        document.body.appendChild(menuScrimEl);

        menuEl = document.createElement("div");
        menuEl.className = "menu";
        const w = 160;
        const h = 88;
        menuEl.style.left = Math.min(Math.max(0, x), window.innerWidth - w - 8) + "px";
        menuEl.style.top = Math.min(Math.max(0, y), window.innerHeight - h - 8) + "px";

        const renameBtn = document.createElement("button");
        renameBtn.textContent = "Rename";
        renameBtn.addEventListener("click", () => {
          closeMenu();
          startRename(id);
        });
        menuEl.appendChild(renameBtn);

        const delBtn = document.createElement("button");
        delBtn.className = "danger";
        delBtn.textContent = "Delete";
        delBtn.addEventListener("click", async () => {
          closeMenu();
          const c = conversations.find((x) => x.id === id);
          if (!confirm('Delete "' + (c && c.title ? c.title : "this conversation") + '"? This can\'t be undone.')) return;
          try {
            await api(`/api/conversations/${id}`, { method: "DELETE" });
          } catch {}
          if (activeId === id) {
            conv = null;
            activeId = null;
            clearChatSurface();
            await setActiveServer(null);
          }
          await loadConversations();
        });
        menuEl.appendChild(delBtn);

        document.body.appendChild(menuEl);
      }

      function closeMenu() {
        if (menuEl) { menuEl.remove(); menuEl = null; }
        if (menuScrimEl) { menuScrimEl.remove(); menuScrimEl = null; }
      }

      async function startRename(id) {
        const row = sidebarList.querySelector('[data-id="' + cssEscape(id) + '"]');
        if (!row) return;
        const titleSpan = row.querySelector(".title");
        if (!titleSpan) return;
        const c = conversations.find((x) => x.id === id);
        const inp = document.createElement("input");
        inp.className = "rename";
        inp.value = (c && c.title) || "";
        titleSpan.replaceWith(inp);
        inp.focus();
        inp.select();
        let done = false;
        const finish = async (commit) => {
          if (done) return;
          done = true;
          const t = inp.value.trim();
          if (commit && t) {
            try {
              const full = await api(`/api/conversations/${id}`);
              full.title = t.slice(0, 80);
              full.updated_at = new Date().toISOString();
              await api(`/api/conversations/${id}`, {
                method: "PUT",
                headers: { "content-type": "application/json" },
                body: JSON.stringify(full),
              });
              if (activeId === id && conv) {
                conv.title = full.title;
                conv.updated_at = full.updated_at;
              }
            } catch {}
          }
          await loadConversations();
        };
        inp.addEventListener("blur", () => finish(true));
        inp.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            finish(true);
          } else if (e.key === "Escape") {
            e.preventDefault();
            finish(false);
          }
        });
      }

      /** Tiny CSS.escape polyfill — older mobile browsers (Safari pre-13.1)
       *  don't have it, and our id format includes hyphens / digits. */
      function cssEscape(s) {
        if (typeof CSS !== "undefined" && CSS.escape) return CSS.escape(s);
        return String(s).replace(/[^a-zA-Z0-9_-]/g, "\\$&");
      }
    </script>
  </body>
</html>
